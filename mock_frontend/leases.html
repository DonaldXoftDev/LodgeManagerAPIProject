<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps — Leases</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { background: var(--surface); padding: 40px; border-radius: 20px; width: 100%; max-width: 480px; box-shadow: var(--shadow-glass); border: 1px solid var(--border); transform: translateY(20px); transition: transform 0.3s; max-height: 90vh; overflow-y: auto; }
        .modal.active .modal-content { transform: translateY(0); }
        .modal-title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 24px; color: var(--text); }
    </style>
</head>
<body>
    <div class="layout fade-in">
        <!-- SIDEBAR -->
        <aside class="sidebar glass-panel" id="sidebar">
            <div class="logo">
                Lodge<span>Ops</span>
                <button class="toggle-btn mobile-close mobile-menu-btn" onclick="document.getElementById('sidebar').classList.remove('mobile-open')">✕</button>
            </div>
            
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="rooms.html" class="nav-item">Rooms</a>
            <a href="leases.html" class="nav-item active">Leases</a>
            <a href="payments.html" class="nav-item">Payments</a>
            <a href="tenants.html" class="nav-item">Tenants</a>
            
            <div class="sidebar-bottom">
                <a href="lodges.html" class="nav-item">Switch Property</a>
                <div class="nav-item" style="color:var(--owing)" onclick="logout()">Log Out</div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <header class="page-header slide-up">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.add('mobile-open')">☰ Menu</button>
                    <div>
                        <h1 class="page-title">Active Leases</h1>
                        <p class="page-subtitle" id="lodge-name-display">Loading...</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="openLeaseModal()">+ Create New Lease</button>
                </div>
            </header>

            <div id="toast-container" class="toast-container"></div>

            <div class="table-wrapper slide-up" style="animation-delay: 0.1s;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Room</th>
                            <th>Tenant</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Rent Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="leases-tbody">
                        <tr class="skeleton-row">
                            <td><div class="skeleton" style="height:20px; width:60px;"></div></td>
                            <td><div class="skeleton" style="height:20px; width:120px;"></div></td>
                            <td><div class="skeleton" style="height:20px; width:80px;"></div></td>
                            <td><div class="skeleton" style="height:20px; width:80px;"></div></td>
                            <td><div class="skeleton" style="height:20px; width:80px;"></div></td>
                            <td><div class="skeleton" style="height:20px; width:60px;"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Create Lease Modal -->
    <div id="lease-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">Create Lease</h2>
            <form id="create-lease-form">
                <div class="form-group floating" style="margin-bottom: 24px;">
                    <select id="lease-room" class="form-input" required style="padding-top: 20px; padding-bottom: 6px;">
                        <option value="">Loading rooms...</option>
                    </select>
                    <label class="form-label" style="top:6px; font-size:11px; color:var(--accent);">Select Room</label>
                </div>
                <div class="form-group floating" style="margin-bottom: 24px;">
                    <select id="lease-tenant" class="form-input" required style="padding-top: 20px; padding-bottom: 6px;">
                        <option value="">Loading tenants...</option>
                    </select>
                    <label class="form-label" style="top:6px; font-size:11px; color:var(--accent);">Select Tenant</label>
                </div>
                <div class="form-group floating">
                    <input type="date" id="lease-start" class="form-input" required placeholder=" ">
                    <label class="form-label">Start Date</label>
                </div>
                <div class="form-group floating">
                    <input type="date" id="lease-end" class="form-input" required placeholder=" ">
                    <label class="form-label">End Date</label>
                </div>
                <div class="form-group floating" style="margin-bottom: 32px;">
                    <input type="number" id="lease-rent" class="form-input" required placeholder=" ">
                    <label class="form-label">Rent Amount</label>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:12px;">
                    <button type="button" class="btn btn-outline" onclick="closeLeaseModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Lease</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/leases.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('active_lodge_id');
            localStorage.removeItem('active_lodge_name');
            window.location.href = 'auth.html';
        }
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type} show`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>

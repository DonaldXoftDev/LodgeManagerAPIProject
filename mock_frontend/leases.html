<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps - Leases</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout fade-in">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="logo"><div style="display:flex; align-items:center;">Lodge<span>Ops</span></div></div>
            <a href="dashboard.html" class="nav-item"><span>Dashboard</span></a>
            <a href="rooms.html" class="nav-item"><span>Rooms</span></a>
            <a href="leases.html" class="nav-item active"><span>Leases</span></a>
            <a href="payments.html" class="nav-item"><span>Payments</span></a>
            <a href="tenants.html" class="nav-item"><span>Active Tenants</span></a>
            <a href="tenant-approvals.html" class="nav-item"><span>Pending Approvals</span></a>
            <div class="sidebar-bottom">
                <a href="lodges.html" class="nav-item" style="color:var(--text-secondary);"><span>Switch Lodge</span></a>
                <div class="nav-item" style="color:var(--owing); cursor:pointer;" onclick="logout()"><span>Log Out</span></div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <header class="page-header slide-up">
                <div>
                    <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">☰</button>
                    <h1 class="page-title">Lease Administration</h1>
                    <p class="page-subtitle">Track and manage active tenancy agreements.</p>
                </div>
                <button class="btn btn-primary" onclick="openLeaseModal()">+ Assign New Lease</button>
            </header>

            <div id="toast-container" class="toast-container"></div>

            <div class="table-wrapper slide-up" style="animation-delay: 0.1s;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Room No.</th>
                            <th>Tenant</th>
                            <th>Duration</th>
                            <th>Status</th>
                            <th style="text-align:right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leases-tbody">
                        <tr><td colspan="5" style="text-align:center; padding: 40px; color:var(--text-tertiary);">Loading lease records...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- LEASE MODAL -->
    <div id="lease-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Assign New Lease</h2>
                <span class="close" onclick="closeLeaseModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="lease-form">
                    <div style="display:flex; gap:16px;">
                        <div class="form-group floating" style="flex:1;">
                            <input type="number" id="room_id" class="form-input" required placeholder=" ">
                            <label class="form-label">Room ID</label>
                        </div>
                        <div class="form-group floating" style="flex:1;">
                            <input type="number" id="tenant_id" class="form-input" required placeholder=" ">
                            <label class="form-label">Tenant ID</label>
                        </div>
                    </div>
                    
                    <div style="display:flex; gap:16px;">
                        <div class="form-group floating" style="flex:1;">
                            <input type="date" id="start_date" class="form-input" required>
                            <label class="form-label" style="top:-10px; font-size:12px;">Start Date</label>
                        </div>
                        <div class="form-group floating" style="flex:1;">
                            <input type="date" id="end_date" class="form-input" required>
                            <label class="form-label" style="top:-10px; font-size:12px;">End Date</label>
                        </div>
                    </div>

                    <div class="form-group floating">
                        <input type="number" id="agreed_rent_amt" class="form-input" required placeholder=" ">
                        <label class="form-label">Agreed Rent Amount (₦)</label>
                    </div>
                    
                    <div class="form-group floating">
                        <input type="number" id="total_amt_paid" class="form-input" required placeholder=" ">
                        <label class="form-label">Total Amount Paid Upfront (₦)</label>
                    </div>
                    
                    <button type="submit" id="btn-lease-submit" class="btn btn-primary" style="width:100%; margin-top:24px;">Create Lease</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lodgeId = localStorage.getItem('active_lodge_id');
            if (!lodgeId) {
                window.location.href = 'lodges.html';
                return;
            }
            fetchLeases(lodgeId);
        });

        async function fetchLeases(lodgeId) {
            try {
                // The backend uses filters. Without filters it returns all history.
                const leases = await apiFetch(`/leases/${lodgeId}`);
                renderLeases(leases);
            } catch (err) {
                showToast(err.message);
                document.getElementById('leases-tbody').innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 40px; color:var(--owing);">Failed to load leases.</td></tr>`;
            }
        }

        function renderLeases(leases) {
            const tbody = document.getElementById('leases-tbody');
            tbody.innerHTML = '';

            if (leases.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 60px; color:var(--text-tertiary); font-size:16px;">No lease records found.</td></tr>`;
                return;
            }

            const formatDate = (dateStr) => {
                const date = new Date(dateStr);
                const d = date.getDate();
                const suffix = ["th", "st", "nd", "rd"][d % 10 > 3 ? 0 : (d % 100 - d % 10 != 10) * d % 10];
                return `${d}${suffix} ${date.toLocaleString('en-US', { month: 'long', year: 'numeric' })}`;
            };

            leases.forEach(l => {
                const tr = document.createElement('tr');
                const isTerminated = String(l.status).toLowerCase() === 'terminated';
                const statusColor = isTerminated ? 'var(--maintenance)' : 'var(--safe)';
                const statusBg = isTerminated ? 'var(--maintenance-bg)' : 'var(--safe-bg)';

                tr.innerHTML = `
                    <td style="font-weight:700; font-size:16px; font-family:'Outfit',sans-serif;">Room ${l.room_no}</td>
                    <td>
                        <div style="font-weight:600; color:var(--text-primary); margin-bottom:4px;">${l.tenant_name}</div>
                    </td>
                    <td>
                        <div style="color:var(--text-secondary); font-size:14px; margin-bottom:4px;">Moved In: <span style="font-weight:600; color:var(--text-primary);">${formatDate(l.start_date)}</span></div>
                        <div style="color:var(--text-tertiary); font-size:13px;">Agreement Ends: <span style="font-weight:600; color:var(--text-primary);">${formatDate(l.end_date)}</span></div>
                    </td>
                    <td>
                        <span style="background:${statusBg}; color:${statusColor}; padding:4px 12px; border-radius:12px; font-size:12px; font-weight:700; text-transform:capitalize;">${l.status}</span>
                    </td>
                    <td>
                        <div style="display:flex; justify-content:flex-end; gap:12px;">
                            ${!isTerminated ? `<button class="btn btn-outline" style="padding: 8px 16px; font-size:13px; color:var(--owing); border-color:var(--owing-border);" onclick="terminateLease(${l.id})">Terminate</button>` : ''}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function terminateLease(leaseId) {
            if(!confirm(`Are you sure you want to forcibly terminate this lease?`)) return;
            try {
                await apiFetch(`/leases/terminate/${leaseId}`, { method: 'PATCH' });
                showToast(`Lease terminated successfully`, 'success');
                fetchLeases(localStorage.getItem('active_lodge_id'));
            } catch (err) {
                showToast('Failed to terminate lease: ' + err.message);
            }
        }

        function openLeaseModal() { document.getElementById('lease-modal').style.display = 'flex'; }
        function closeLeaseModal() { document.getElementById('lease-modal').style.display = 'none'; document.getElementById('lease-form').reset(); }
        
        document.getElementById('lease-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-lease-submit');
            btn.textContent = 'Assigning...'; btn.disabled = true;
            
            const payload = {
                room_id: parseInt(document.getElementById('room_id').value),
                tenant_id: parseInt(document.getElementById('tenant_id').value),
                start_date: document.getElementById('start_date').value,
                end_date: document.getElementById('end_date').value,
                agreed_rent_amt: parseInt(document.getElementById('agreed_rent_amt').value),
                total_amt_paid: parseInt(document.getElementById('total_amt_paid').value)
            };
            
            try {
                await apiFetch('/leases/', { method: 'POST', body: JSON.stringify(payload) });
                showToast('Lease assigned successfully', 'success');
                closeLeaseModal();
                fetchLeases(localStorage.getItem('active_lodge_id'));
            } catch (err) {
                showToast(err.message);
            } finally {
                btn.textContent = 'Create Lease'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>

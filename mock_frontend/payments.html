<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps - Payments Ledger</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout fade-in">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="logo"><div style="display:flex; align-items:center;">Lodge<span>Ops</span></div></div>
            <a href="dashboard.html" class="nav-item"><span>Dashboard</span></a>
            <a href="rooms.html" class="nav-item"><span>Rooms</span></a>
            <a href="leases.html" class="nav-item"><span>Leases</span></a>
            <a href="payments.html" class="nav-item active"><span>Payments</span></a>
            <a href="tenants.html" class="nav-item"><span>Active Tenants</span></a>
            <a href="tenant-approvals.html" class="nav-item"><span>Pending Approvals</span></a>
            <div class="sidebar-bottom">
                <a href="lodges.html" class="nav-item" style="color:var(--text-secondary);"><span>Switch Lodge</span></a>
                <div class="nav-item" style="color:var(--owing); cursor:pointer;" onclick="logout()"><span>Log Out</span></div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <header class="page-header slide-up">
                <div>
                    <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">☰</button>
                    <h1 class="page-title">Payments Ledger</h1>
                    <p class="page-subtitle">View and record manual transactions.</p>
                </div>
                <button class="btn btn-primary" onclick="openPaymentModal()">+ Record Offline Payment</button>
            </header>

            <div id="toast-container" class="toast-container"></div>

            <div class="table-wrapper slide-up" style="animation-delay: 0.1s;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Transaction ID</th>
                            <th>Amount Paid</th>
                            <th>Date Recorded</th>
                        </tr>
                    </thead>
                    <tbody id="payments-tbody">
                        <tr><td colspan="3" style="text-align:center; padding: 40px; color:var(--text-tertiary);">Loading payments...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- PAYMENT MODAL -->
    <div id="payment-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Record Offline Payment</h2>
                <span class="close" onclick="closePaymentModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="payment-form">
                    <div class="form-group floating">
                        <input type="number" id="pay_lease_id" class="form-input" required placeholder=" ">
                        <label class="form-label">Lease ID</label>
                    </div>
                    <div class="form-group floating">
                        <input type="number" id="amount_paid" class="form-input" required placeholder=" ">
                        <label class="form-label">Amount Paid (₦)</label>
                    </div>
                    <div class="form-group floating">
                        <input type="date" id="payment_date" class="form-input">
                        <label class="form-label" style="top:-10px; font-size:12px;">Payment Date (Optional)</label>
                    </div>
                    
                    <button type="submit" id="btn-payment-submit" class="btn btn-primary" style="width:100%; margin-top:24px;">Record Payment</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lodgeId = localStorage.getItem('active_lodge_id');
            if(lodgeId) loadAllPayments(lodgeId);
        });

        async function loadAllPayments(lodgeId) {
            const tbody = document.getElementById('payments-tbody');
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 40px; color:var(--text-tertiary);">Aggregating ledger records...</td></tr>`;

            try {
                const leases = await apiFetch(`/lodges/${lodgeId}/leases`);
                let allPayments = [];
                
                await Promise.all(leases.map(async (lease) => {
                    try {
                        const payments = await apiFetch(`/payments/${lease.id}`);
                        payments.forEach(p => p._leaseInfo = lease);
                        allPayments = allPayments.concat(payments);
                    } catch(e) {}
                }));
                
                allPayments.sort((a, b) => new Date(b.payment_date) - new Date(a.payment_date));
                renderPayments(allPayments);
            } catch (err) {
                showToast(err.message);
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 40px; color:var(--owing);">Failed to load ledger records.</td></tr>`;
            }
        }

        function renderPayments(payments) {
            const tbody = document.getElementById('payments-tbody');
            tbody.innerHTML = '';

            if (payments.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 60px; color:var(--text-tertiary); font-size:16px;">No payments recorded for this lodge.</td></tr>`;
                return;
            }

            payments.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-family:monospace; color:var(--text-secondary); font-size:14px;">
                        TXN-${p.id}<br>
                        <span style="font-size:11px; color:var(--accent-base);">Lease ${p._leaseInfo?.id || p.lease_id}</span>
                    </td>
                    <td style="font-weight:700; color:var(--safe); font-size:16px;">₦${(p.amount_paid || 0).toLocaleString('en-NG')}.00</td>
                    <td style="color:var(--text-secondary); font-size:14px;">${new Date(p.payment_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openPaymentModal() { document.getElementById('payment-modal').style.display = 'flex'; }
        function closePaymentModal() { document.getElementById('payment-modal').style.display = 'none'; document.getElementById('payment-form').reset(); }
        
        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-payment-submit');
            btn.textContent = 'Recording...'; btn.disabled = true;
            
            const payload = {
                lease_id: parseInt(document.getElementById('pay_lease_id').value),
                amount_paid: parseInt(document.getElementById('amount_paid').value)
            };
            
            const pDate = document.getElementById('payment_date').value;
            if (pDate) { payload.payment_date = new Date(pDate).toISOString(); }
            
            try {
                await apiFetch('/payments/create-payment', { method: 'POST', body: JSON.stringify(payload) });
                showToast('Payment recorded successfully', 'success');
                closePaymentModal();
                const lodgeId = localStorage.getItem('active_lodge_id');
                if(lodgeId) loadAllPayments(lodgeId);
            } catch (err) {
                showToast(err.message);
            } finally {
                btn.textContent = 'Record Payment'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>

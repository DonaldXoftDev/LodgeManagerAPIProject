<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps - My Lodges</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout fade-in">
        <main class="main" style="margin-left:0; align-items:center;">
            <div style="width:100%; max-width:1000px; margin-top: 40px;">
                <div class="page-header slide-up">
                    <div>
                        <div class="logo" style="margin-bottom: 24px; font-size:24px;">Lodge<span>Ops</span></div>
                        <h1 class="page-title" style="font-size: 36px;">Select Lodge Portfolio</h1>
                        <p class="page-subtitle">Choose a lodge to manage its inventory and tenants.</p>
                    </div>
                    <div style="display:flex; gap:16px;">
                        <button class="btn btn-primary" onclick="openLodgeModal()">+ Register New Lodge</button>
                        <button class="btn btn-outline" style="color:var(--owing); border-color:var(--owing-border);" onclick="logout()">Log Out</button>
                    </div>
                </div>

                <div id="toast-container" class="toast-container"></div>
                
                <div id="lodges-grid" class="room-grid slide-up" style="animation-delay: 0.1s;">
                    <!-- Injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- LODGE MODAL -->
    <div id="lodge-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Register New Lodge</h2>
                <span class="close" onclick="closeLodgeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="lodge-form">
                    <div class="form-group floating">
                        <input type="text" id="lodge_name" class="form-input" required placeholder=" ">
                        <label class="form-label">Lodge Name</label>
                    </div>
                    <div class="form-group floating">
                        <input type="text" id="lodge_address" class="form-input" required placeholder=" ">
                        <label class="form-label">Address</label>
                    </div>
                    
                    <div style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border-color);">
                        <p style="font-weight:600; margin-bottom:12px;">Auto-Generate Rooms (Optional)</p>
                        <div style="display:flex; gap:16px;">
                            <div class="form-group floating" style="flex:1;">
                                <input type="number" id="start_num" class="form-input" placeholder=" ">
                                <label class="form-label">Start No.</label>
                            </div>
                            <div class="form-group floating" style="flex:1;">
                                <input type="number" id="end_num" class="form-input" placeholder=" ">
                                <label class="form-label">End No.</label>
                            </div>
                        </div>
                        <div class="form-group floating">
                            <input type="number" id="default_rent" class="form-input" placeholder=" ">
                            <label class="form-label">Default Rent (₦)</label>
                        </div>
                        <div class="form-group floating">
                            <input type="text" id="default_desc" class="form-input" placeholder=" ">
                            <label class="form-label">Default Description</label>
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-lodge-submit" class="btn btn-primary" style="width:100%; margin-top:24px;">Register Lodge</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchLodges);

        async function fetchLodges() {
            try {
                const lodges = await apiFetch('/lodges/');
                renderLodges(lodges);
            } catch (err) {
                showToast(err.message, 'error');
                document.getElementById('lodges-grid').innerHTML = '';
            }
        }

        function renderLodges(lodges) {
            const grid = document.getElementById('lodges-grid');
            grid.innerHTML = '';
            
            if (!lodges || lodges.length === 0) {
                grid.innerHTML = `<div class="glass-panel" style="grid-column: 1 / -1; text-align:center; padding: 60px;">You have not registered any lodges yet.</div>`;
                return;
            }

            lodges.forEach(lodge => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div style="font-family: 'Outfit'; font-size: 28px; font-weight: 700; margin-bottom: 8px; color:var(--text-primary);">${lodge.name}</div>
                    <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; display:flex; gap:8px; align-items:center;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        ${lodge.address || 'No address provided'}
                    </div>
                    <div style="font-size: 13px; color: var(--accent-base); font-weight:600; text-transform:uppercase; letter-spacing:1px;">
                        Manage Portfolio →
                    </div>
                `;
                card.onclick = () => {
                    localStorage.setItem('active_lodge_id', lodge.id);
                    localStorage.setItem('active_lodge_name', lodge.name);
                    window.location.href = 'dashboard.html';
                };
                grid.appendChild(card);
            });
        }

        function openLodgeModal() { document.getElementById('lodge-modal').style.display = 'flex'; }
        function closeLodgeModal() { document.getElementById('lodge-modal').style.display = 'none'; document.getElementById('lodge-form').reset(); }
        
        document.getElementById('lodge-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-lodge-submit');
            btn.textContent = 'Registering...'; btn.disabled = true;
            
            const payload = {
                name: document.getElementById('lodge_name').value,
                address: document.getElementById('lodge_address').value
            };
            
            const startNum = document.getElementById('start_num').value;
            if (startNum) {
                payload.room_generator = {
                    prefix: "",
                    start_number: parseInt(startNum),
                    end_number: parseInt(document.getElementById('end_num').value || startNum),
                    default_rent: parseInt(document.getElementById('default_rent').value || 0),
                    default_description: document.getElementById('default_desc').value || 'Standard room'
                };
            }
            
            try {
                await apiFetch('/lodges/register', { method: 'POST', body: JSON.stringify(payload) });
                showToast('Lodge registered successfully', 'success');
                closeLodgeModal();
                fetchLodges();
            } catch (err) {
                showToast(err.message);
            } finally {
                btn.textContent = 'Register Lodge'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>

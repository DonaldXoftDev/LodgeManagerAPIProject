<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps - My Leases</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout fade-in">
        <main class="main" style="margin-left:0; align-items:center;">
            <div style="width:100%; max-width:1000px; margin-top: 40px;">
                <div class="page-header slide-up">
                    <div>
                        <div class="logo" style="margin-bottom: 24px; font-size:24px;">Lodge<span>Ops</span></div>
                        <h1 class="page-title" style="font-size: 36px;">Select Lease Profile</h1>
                        <p class="page-subtitle">Choose an active lease to view its dashboard.</p>
                    </div>
                    <button class="btn btn-outline" style="color:var(--owing); border-color:var(--owing-border);" onclick="logout()">Log Out</button>
                </div>

                <div id="toast-container" class="toast-container"></div>
                
                <div id="leases-grid" class="room-grid slide-up" style="animation-delay: 0.1s;">
                    <!-- Injected by JS -->
                </div>
                
                <div id="empty-state" class="glass-panel slide-up" style="display:none; text-align:center; padding: 60px 40px; margin-top: 32px;">
                    <h3 style="font-size:24px; font-weight:700; font-family:'Outfit',sans-serif;">No active leases</h3>
                    <p style="color:var(--text-secondary); margin-top:12px;">You don't have any leases recorded yet.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchLeases);

        async function fetchLeases() {
            try {
                const leases = await apiFetch('/leases/tenant/me');
                renderLeases(leases);
            } catch (err) {
                showToast(err.message, 'error');
                document.getElementById('leases-grid').innerHTML = '';
            }
        }

        function renderLeases(leases) {
            const grid = document.getElementById('leases-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';
            
            if (!leases || leases.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                leases.forEach(lease => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.innerHTML = `
                        <div style="font-family: 'Outfit'; font-size: 28px; font-weight: 700; margin-bottom: 12px; color:var(--text-primary);">Room ${lease.room_no}</div>
                        <div style="font-size: 14px; background:var(--safe-bg); color:var(--safe); border:1px solid var(--safe-border); display:inline-block; padding:4px 12px; border-radius:12px; margin-bottom: 24px; font-weight:600;">Active Lease</div>
                        <div style="font-size: 13px; color: var(--text-secondary); display:flex; justify-content:space-between; font-weight:500;">
                            <span>Start: ${new Date(lease.start_date).toLocaleDateString()}</span>
                            <span>End: ${new Date(lease.end_date).toLocaleDateString()}</span>
                        </div>
                    `;
                    card.onclick = () => {
                        localStorage.setItem('active_tenant_room_no', lease.room_no);
                        window.location.href = 'tenant-dashboard.html';
                    };
                    grid.appendChild(card);
                });
            }
        }
    </script>
</body>
</html>

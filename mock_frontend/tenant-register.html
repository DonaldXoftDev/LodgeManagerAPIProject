<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps - Tenant Registration</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
        .auth-container::before {
            content: ''; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, rgba(255,255,255,0) 70%);
            bottom: -200px; left: -200px; z-index: -1;
        }
        .auth-box { width: 100%; max-width: 480px; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="auth-container fade-in">
        <div class="auth-box glass-panel" id="main-panel">
            <div class="auth-header">
                <div class="logo" style="margin-bottom: 24px; text-align: center;">Lodge<span>Ops</span></div>
                <h1 style="font-size: 28px;">Accept Invite</h1>
                <p style="margin-top: 8px;" id="invite-status">Validating your invite link...</p>
            </div>

            <form id="register-form" style="display:none;">
                <input type="hidden" id="invite_id">
                
                <div style="display:flex; gap:16px;">
                    <div class="form-group floating" style="flex:1;">
                        <input type="text" id="first_name" class="form-input" required placeholder=" ">
                        <label class="form-label">First Name</label>
                    </div>
                    <div class="form-group floating" style="flex:1;">
                        <input type="text" id="last_name" class="form-input" required placeholder=" ">
                        <label class="form-label">Last Name</label>
                    </div>
                </div>
                
                <div class="form-group floating">
                    <input type="email" id="email" class="form-input" required placeholder=" ">
                    <label class="form-label">Email Address</label>
                </div>
                <div class="form-group floating">
                    <input type="tel" id="phone_no" class="form-input" required placeholder=" ">
                    <label class="form-label">Phone Number</label>
                </div>
                
                <div class="form-group floating">
                    <select id="tenant_type" class="form-input" required>
                        <option value="Student">Student</option>
                        <option value="Others">Working Class / Others</option>
                    </select>
                    <label class="form-label">Tenant Type</label>
                </div>

                <div style="display:flex; gap:16px;">
                    <div class="form-group floating" style="flex:1;">
                        <input type="text" id="emergency_contact_name" class="form-input" required placeholder=" ">
                        <label class="form-label">Emergency Contact Name</label>
                    </div>
                    <div class="form-group floating" style="flex:1;">
                        <input type="tel" id="emergency_contact_phone_no" class="form-input" required placeholder=" ">
                        <label class="form-label">Emergency Contact Phone</label>
                    </div>
                </div>

                <div id="student-fields" style="display:flex; flex-direction:column; gap:16px; margin-bottom:16px;">
                    <div style="display:flex; gap:16px;">
                        <div class="form-group floating" style="flex:1;">
                            <input type="text" id="department" class="form-input" placeholder=" ">
                            <label class="form-label">Department</label>
                        </div>
                        <div class="form-group floating" style="flex:1;">
                            <select id="level" class="form-input">
                                <option value="100">100L</option>
                                <option value="200">200L</option>
                                <option value="300">300L</option>
                                <option value="400">400L</option>
                                <option value="500">500L</option>
                                <option value="600">600L</option>
                            </select>
                            <label class="form-label">Level</label>
                        </div>
                    </div>
                    <div class="form-group floating">
                        <input type="number" id="reg_no" class="form-input" placeholder=" ">
                        <label class="form-label">Registration Number</label>
                    </div>
                </div>

                <div class="form-group floating">
                    <input type="password" id="password" class="form-input" required placeholder=" ">
                    <label class="form-label">Create Password</label>
                </div>
                <button type="submit" id="btn-submit" class="btn btn-primary" style="width:100%; padding: 16px; font-size: 16px; margin-top: 16px;">Register & Join</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const inviteId = params.get('invite_id');
            const statusEl = document.getElementById('invite-status');
            
            if (!inviteId) {
                statusEl.textContent = 'Invalid link. No invite ID provided.';
                statusEl.style.color = 'var(--owing)';
                return;
            }

            try {
                // Validate invite: GET /invites/{invite_id}
                const invite = await apiFetch(`/invites/${inviteId}`);
                
                if (invite.status === 'Accepted') {
                    statusEl.textContent = 'This invite link has already been used.';
                    statusEl.style.color = 'var(--owing)';
                    return;
                }
                
                // Show form
                statusEl.textContent = 'Please complete your profile to join the lodge.';
                document.getElementById('invite_id').value = inviteId;
                document.getElementById('register-form').style.display = 'block';
                
            } catch (err) {
                statusEl.textContent = 'Failed to validate invite: ' + err.message;
                statusEl.style.color = 'var(--owing)';
            }
        });

        document.getElementById('tenant_type').addEventListener('change', (e) => {
            const studentFields = document.getElementById('student-fields');
            if (e.target.value === 'Student') {
                studentFields.style.display = 'flex';
            } else {
                studentFields.style.display = 'none';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.textContent = 'Joining...';
            btn.disabled = true;

            const tType = document.getElementById('tenant_type').value;
            
            const tenantInfo = {
                tenant_type: tType,
                emergency_contact_name: document.getElementById('emergency_contact_name').value,
                emergency_contact_phone_no: document.getElementById('emergency_contact_phone_no').value
            };
            
            if (tType === 'Student') {
                tenantInfo.department = document.getElementById('department').value || null;
                tenantInfo.level = document.getElementById('level').value || null;
                tenantInfo.reg_no = parseInt(document.getElementById('reg_no').value) || null;
            }

            const payload = {
                invite_id: document.getElementById('invite_id').value,
                user_info: {
                    first_name: document.getElementById('first_name').value,
                    last_name: document.getElementById('last_name').value,
                    email: document.getElementById('email').value,
                    phone_no: document.getElementById('phone_no').value,
                    password: document.getElementById('password').value
                },
                tenant_info: tenantInfo
            };

            try {
                // POST /auth/register/tenant
                await apiFetch('/auth/register/tenant', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                showToast('Registration successful! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                showToast(err.message);
                btn.textContent = 'Register & Join';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout fade-in">
        <!-- SIDEBAR -->
        <aside class="sidebar glass-panel" id="sidebar">
            <div class="logo">
                Lodge<span>Ops</span>
                <button class="toggle-btn mobile-close mobile-menu-btn" onclick="document.getElementById('sidebar').classList.remove('mobile-open')">✕</button>
            </div>
            
            <a href="dashboard.html" class="nav-item active">Dashboard</a>
            <a href="rooms.html" class="nav-item">Rooms</a>
            <a href="leases.html" class="nav-item">Leases</a>
            <a href="payments.html" class="nav-item">Payments</a>
            <a href="tenants.html" class="nav-item">Tenants</a>
            
            <div class="sidebar-bottom">
                <a href="lodges.html" class="nav-item">Switch Property</a>
                <div class="nav-item" style="color:var(--owing)" onclick="logout()">Log Out</div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <header class="page-header slide-up">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.add('mobile-open')">☰ Menu</button>
                    <div>
                        <h1 class="page-title">Property Overview</h1>
                        <p class="page-subtitle" id="lodge-name-display">Loading...</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-ai" onclick="generateReport()">✨ AI Insights</button>
                    <div class="user-chip">
                        <div class="avatar" id="user-avatar">AD</div>
                        <span id="user-name">Admin</span>
                    </div>
                </div>
            </header>

            <!-- TOAST CONTAINER -->
            <div id="toast-container" class="toast-container"></div>

            <!-- STATIC FACTS + OCCUPANCY ROW -->
            <div class="facts-row slide-up" style="animation-delay: 0.1s;">
                <div class="occupancy-chip glass-panel">
                    <div class="occupancy-ring">
                        <svg viewBox="0 0 100 100">
                            <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                            <circle class="ring-fill" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283" id="occ-ring"></circle>
                        </svg>
                        <div class="occupancy-text" id="occ-text">0%</div>
                    </div>
                    <div class="occupancy-info">
                        <div class="occupancy-pct" id="occ-val">0%</div>
                        <div class="occupancy-label">Current Occupancy</div>
                    </div>
                </div>
                
                <div class="fact-chip glass-panel">
                    <div class="fact-label">Total Rooms</div>
                    <div class="fact-num" id="fact-rooms">0</div>
                </div>
                <div class="fact-chip glass-panel">
                    <div class="fact-label">Total Tenants</div>
                    <div class="fact-num" id="fact-tenants">0</div>
                </div>
                <div class="fact-chip glass-panel" style="background:var(--pending-bg); border: 1px solid var(--pending-border);">
                    <div class="fact-label" style="color:var(--pending)">Pending Move-outs</div>
                    <div class="fact-num" id="fact-turnover" style="color:var(--pending)">0</div>
                </div>
            </div>

            <!-- FINANCIAL STRIP (5 Metrics) -->
            <div class="fin-strip slide-up" style="animation-delay: 0.2s;">
                <div class="fin-item glass-panel">
                    <div class="fin-label">Potential Rev</div>
                    <div class="fin-amount" id="fin-potential">₦0.00</div>
                </div>
                <div class="fin-item glass-panel">
                    <div class="fin-label">Forecasted</div>
                    <div class="fin-amount" id="fin-forecasted">₦0.00</div>
                </div>
                <div class="fin-item glass-panel">
                    <div class="fin-label">Expected Now</div>
                    <div class="fin-amount expected" id="fin-expected">₦0.00</div>
                </div>
                <div class="fin-item glass-panel">
                    <div class="fin-label">Collected</div>
                    <div class="fin-amount collected" id="fin-collected">₦0.00</div>
                </div>
                <div class="fin-item glass-panel">
                    <div class="fin-label">Unpaid Rent</div>
                    <div class="fin-amount unpaid" id="fin-unpaid">₦0.00</div>
                </div>
            </div>

            <div class="top-bar slide-up" style="animation-delay: 0.3s; margin-bottom: 24px;">
                <div class="results-label" id="results-count">Showing <span>0</span> rooms</div>
                <input type="text" class="search-input glass-panel" id="search-input" placeholder="Search by room no or tenant..." style="padding: 12px 16px;">
            </div>

            <!-- ROOM GRID -->
            <div class="room-grid slide-up" id="dashboard-grid" style="animation-delay: 0.4s;">
                <!-- Skeleton Loaders -->
                <div class="room-card glass-panel skeleton" style="height: 140px;"></div>
                <div class="room-card glass-panel skeleton" style="height: 140px;"></div>
                <div class="room-card glass-panel skeleton" style="height: 140px;"></div>
                <div class="room-card glass-panel skeleton" style="height: 140px;"></div>
                <!-- Room cards injected by JS -->
            </div>

        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('active_lodge_id');
            localStorage.removeItem('active_lodge_name');
            window.location.href = 'auth.html';
        }
        function generateReport() {
            showToast("AI Insights feature coming soon!", "success");
        }
        
        // Custom Toast Function for the new UI
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type} show`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>

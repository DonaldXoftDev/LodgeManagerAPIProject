<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout fade-in">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="logo"><div style="display:flex; align-items:center;">Lodge<span>Ops</span></div></div>
            <a href="dashboard.html" class="nav-item active"><span>Dashboard</span></a>
            <a href="rooms.html" class="nav-item"><span>Rooms</span></a>
            <a href="leases.html" class="nav-item"><span>Leases</span></a>
            <a href="payments.html" class="nav-item"><span>Payments</span></a>
            <a href="tenants.html" class="nav-item"><span>Active Tenants</span></a>
            <a href="tenant-approvals.html" class="nav-item"><span>Pending Approvals</span></a>
            <div class="sidebar-bottom">
                <a href="lodges.html" class="nav-item" style="color:var(--text-secondary);"><span>Switch Lodge</span></a>
                <div class="nav-item" style="color:var(--owing); cursor:pointer;" onclick="logout()"><span>Log Out</span></div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <header class="page-header slide-up">
                <div>
                    <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">☰</button>
                    <h1 class="page-title">Dashboard Overview</h1>
                    <p class="page-subtitle" id="lodge-name-display">Loading...</p>
                </div>
            </header>

            <div id="toast-container" class="toast-container"></div>

            <!-- FINANCIAL STRIP -->
            <div class="fin-strip slide-up" style="animation-delay: 0.1s;">
                <div class="card glass-panel fin-item">
                    <div class="fin-label">Potential Revenue</div>
                    <div class="fin-amount" id="fin-potential">0.00</div>
                </div>
                <div class="card glass-panel fin-item">
                    <div class="fin-label">Expected Now</div>
                    <div class="fin-amount" id="fin-expected" style="color:var(--accent-base);">0.00</div>
                </div>
                <div class="card glass-panel fin-item">
                    <div class="fin-label">Collected</div>
                    <div class="fin-amount" id="fin-collected" style="color:var(--safe);">0.00</div>
                </div>
                <div class="card glass-panel fin-item" style="background:var(--owing-bg); border-color:var(--owing-border);">
                    <div class="fin-label" style="color:var(--owing)">Unpaid Rent</div>
                    <div class="fin-amount" id="fin-unpaid" style="color:var(--owing);">0.00</div>
                </div>
            </div>

            <!-- STATS ROW -->
            <div class="stats-row slide-up" style="animation-delay: 0.2s;">
                <div class="glass-panel" style="display:flex; flex-direction:column; justify-content:center; align-items:center;">
                    <div style="font-size:48px; font-weight:700; font-family:'Outfit', sans-serif;" id="fact-rooms">0</div>
                    <div style="color:var(--text-secondary); font-size:14px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Total Rooms</div>
                </div>
                <div class="glass-panel" style="display:flex; flex-direction:column; justify-content:center; align-items:center;">
                    <div style="font-size:48px; font-weight:700; font-family:'Outfit', sans-serif;" id="fact-tenants">0</div>
                    <div style="color:var(--text-secondary); font-size:14px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Total Tenants</div>
                </div>
                <div class="glass-panel" style="display:flex; align-items:center; justify-content:center; gap: 24px; padding: 24px;">
                    <div class="occupancy-ring" style="width: 80px; height: 80px;">
                        <svg viewBox="0 0 100 100">
                            <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                            <circle class="ring-fill" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283" id="occ-ring"></circle>
                        </svg>
                        <div class="occupancy-text" id="occ-text" style="font-size: 20px;">0%</div>
                    </div>
                    <div>
                        <div style="color:var(--text-secondary); font-size:14px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Occupancy</div>
                    </div>
                </div>
            </div>

            <!-- FILTERS BAR -->
            <div class="filters-bar slide-up" style="animation-delay: 0.3s;">
                <button class="filter-chip active" data-filter="all">All Rooms</button>
                <button class="filter-chip" data-filter="Safe">Safe</button>
                <button class="filter-chip" data-filter="Expiring">Expiring</button>
                <button class="filter-chip" data-filter="Chase Rent">Chase Rent</button>
                <button class="filter-chip" data-filter="Pending">Pending</button>
                <button class="filter-chip" data-filter="Vacant">Vacant</button>
                <button class="filter-chip" data-filter="Maintenance">Maintenance</button>
            </div>

            <!-- SEARCH -->
            <div class="slide-up" style="animation-delay: 0.4s; margin-bottom: 24px; display:flex; justify-content:space-between; align-items:center;">
                <div id="results-count" style="font-weight:600; color:var(--text-secondary);">Showing 0 rooms</div>
                <div class="form-group floating" style="margin:0; width:300px;">
                    <input type="text" id="search-input" class="form-input" style="padding-top:12px; padding-bottom:12px;" placeholder="Search rooms...">
                </div>
            </div>

            <!-- ROOM GRID -->
            <div class="room-grid slide-up" id="dashboard-grid" style="animation-delay: 0.5s;">
                <!-- Room cards injected by JS -->
            </div>

            <!-- SIDE PANEL -->
            <div id="room-panel" class="side-panel">
                <div class="side-panel-header">
                    <h2 class="side-panel-title" id="panel-room-no">Room Details</h2>
                    <button class="close-panel-btn" onclick="document.getElementById('room-panel').classList.remove('open')">&times;</button>
                </div>
                <!-- Breathable flex container -->
                <div id="panel-content" class="panel-content">
                    <!-- Injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps — Tenants</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout fade-in">
        <!-- SIDEBAR -->
        <aside class="sidebar glass-panel" id="sidebar">
            <div class="logo">
                Lodge<span>Ops</span>
                <button class="toggle-btn mobile-close mobile-menu-btn" onclick="document.getElementById('sidebar').classList.remove('mobile-open')">✕</button>
            </div>
            
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="rooms.html" class="nav-item">Rooms</a>
            <a href="leases.html" class="nav-item">Leases</a>
            <a href="payments.html" class="nav-item">Payments</a>
            <a href="tenants.html" class="nav-item active">Tenants</a>
            
            <div class="sidebar-bottom">
                <a href="lodges.html" class="nav-item">Switch Property</a>
                <div class="nav-item" style="color:var(--owing)" onclick="logout()">Log Out</div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <header class="page-header slide-up">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.add('mobile-open')">☰ Menu</button>
                    <div>
                        <h1 class="page-title">Tenant Directory</h1>
                        <p class="page-subtitle" id="lodge-name-display">Loading...</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="generateInvite()">+ Invite Tenant</button>
                </div>
            </header>

            <div id="toast-container" class="toast-container"></div>

            <div class="table-wrapper slide-up" style="animation-delay: 0.1s;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Tenant Name</th>
                            <th>Contact</th>
                            <th>Type</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tenants-tbody">
                        <tr class="skeleton-row">
                            <td><div class="skeleton" style="height:20px; width:120px;"></div></td>
                            <td><div class="skeleton" style="height:20px; width:100px;"></div></td>
                            <td><div class="skeleton" style="height:20px; width:80px;"></div></td>
                            <td><div class="skeleton" style="height:20px; width:60px;"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/tenants.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('active_lodge_id');
            localStorage.removeItem('active_lodge_name');
            window.location.href = 'auth.html';
        }
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type} show`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        async function generateInvite() {
            const lodgeId = localStorage.getItem('active_lodge_id');
            if (!lodgeId) return showToast('No active lodge selected.');
            try {
                // Mock invite generation
                const inviteLink = window.location.origin + '/mock_frontend/tenant-register.html?invite_id=mock-uuid-123';
                await navigator.clipboard.writeText(inviteLink);
                showToast('Invite link copied to clipboard!', 'success');
            } catch(e) {
                showToast('Failed to copy link.', 'error');
            }
        }
    </script>
</body>
</html>

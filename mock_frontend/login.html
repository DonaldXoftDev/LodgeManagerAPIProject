<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeOps - Sign In</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
        .auth-container::before {
            content: ''; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, rgba(255,255,255,0) 70%);
            top: -200px; left: -200px; z-index: -1;
        }
        .auth-box { width: 100%; max-width: 420px; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="auth-container fade-in">
        <div class="auth-box glass-panel">
            <div class="auth-header">
                <div class="logo" style="margin-bottom: 24px; text-align: center;">Lodge<span>Ops</span></div>
                <h1 style="font-size: 28px;">Welcome back</h1>
                <p style="margin-top: 8px;">Enter your credentials to access your account.</p>
            </div>

            <form id="login-form">
                <div class="form-group floating">
                    <input type="email" id="email" class="form-input" required placeholder=" ">
                    <label class="form-label">Email Address</label>
                </div>
                <div class="form-group floating">
                    <input type="password" id="password" class="form-input" required placeholder=" ">
                    <label class="form-label">Password</label>
                </div>
                <button type="submit" id="btn-submit" class="btn btn-primary" style="width:100%; padding: 16px; font-size: 16px; margin-top: 16px;">Sign In</button>
                
                <div style="margin-top: 32px; text-align: center; font-size: 14px; color: var(--text-secondary);">
                    <p>New Landlord? <a href="register.html" style="color:var(--accent-base); text-decoration:none; font-weight:600;">Create an account</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            const payload = new URLSearchParams({
                username: document.getElementById('email').value,
                password: document.getElementById('password').value
            });

            try {
                // 1. Get Token (POST /auth/login) - Cookies will be automatically set by the backend
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: payload.toString(),
                    credentials: 'include' // Allow backend to set the cookie securely
                });
                
                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.detail || 'Login failed');
                }
                
                // 2. Fetch User Profile to determine routing (GET /auth/me)
                const user = await apiFetch('/auth/me');
                
                if (user.role === 'Landlord') {
                    // Fetch landlord's lodges to set active lodge
                    const lodges = await apiFetch('/lodges/');
                    if (lodges && lodges.length > 0) {
                        localStorage.setItem('active_lodge_id', lodges[0].id);
                        localStorage.setItem('active_lodge_name', lodges[0].name);
                    }
                    window.location.href = 'dashboard.html';
                } else if (user.role === 'Tenant') {
                    window.location.href = 'tenant-dashboard.html';
                } else {
                    throw new Error('Unknown role: ' + user.role);
                }
                
            } catch (err) {
                showToast(err.message);
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
